<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; background: #eeeae0; }
  * { box-sizing: border-box; }
  @media (hover: none) { [data-clinic-cursor] { display: none !important; } }
  @media (min-width: 681px) and (max-width: 1024px) {
    .cl-hero { font-size: 80px !important; letter-spacing: -2.5px !important; line-height: 0.9 !important; }
    .cl-h1 { font-size: 40px !important; letter-spacing: -0.8px !important; }

  @media (max-width: 680px) {
    .cl-grid { grid-template-columns: 1fr !important; column-gap: 0 !important; }
    .cl-grid > * { grid-column: 1 / -1 !important; }
    .cl-hero { font-size: 52px !important; letter-spacing: -1.5px !important; line-height: 0.9 !important; }
    .cl-h1 { font-size: 34px !important; letter-spacing: -0.4px !important; }
    .cl-hide-mobile { display: none !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
// ===== shared.jsx =====
// Shared primitives for all three directions
// - Cursor (per-direction style)
// - ECG/sensor/grid motifs
// - Simple page router (hash-based, scoped per artboard)
// - Scroll reveal hook
// - Placeholder portrait

const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ─────────────────────────────────────────────────────────────
// Route context — each artboard owns its own route state, so
// clicking "About" in one doesn't affect the others.
// ─────────────────────────────────────────────────────────────
const RouteCtx = createContext(null);

function RouteProvider({ initial = 'home', children }) {
  const [route, setRoute] = useState(initial);
  const [prev, setPrev] = useState(initial);
  const go = useCallback((r) => {
    setPrev((p) => route);
    setRoute(r);
  }, [route]);
  return (
    <RouteCtx.Provider value={{ route, prev, go }}>
      {children}
    </RouteCtx.Provider>
  );
}

const useRoute = () => useContext(RouteCtx);

function useBreakpoint(mobileBp = 680, tabletBp = 1024) {
  const get = () => ({
    isMobile: window.innerWidth <= mobileBp,
    isTablet: window.innerWidth > mobileBp && window.innerWidth <= tabletBp,
  });
  const [bp, setBp] = useState(get);
  useEffect(() => {
    const h = () => setBp(get());
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return bp;
}
const MobileCtx = createContext({ isMobile: false, isTablet: false });

// ─────────────────────────────────────────────────────────────
// Reveal on mount/route change — IntersectionObserver within
// the artboard scroll container.
// ─────────────────────────────────────────────────────────────
function Reveal({ children, delay = 0, y = 12, as: As = 'div', style = {}, ...rest }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    setShown(false);
    const t = setTimeout(() => setShown(true), delay);
    return () => clearTimeout(t);
  }, [delay]);
  return (
    <As ref={ref} style={{
      opacity: shown ? 1 : 0,
      transform: shown ? 'translateY(0)' : `translateY(${y}px)`,
      transition: 'opacity .7s cubic-bezier(.2,.7,.3,1), transform .7s cubic-bezier(.2,.7,.3,1)',
      ...style,
    }} {...rest}>{children}</As>
  );
}

// ─────────────────────────────────────────────────────────────
// Custom cursor (scoped to a container). Variant controls dot size/ring.
// ─────────────────────────────────────────────────────────────
function CustomCursor({ containerRef, variant = 'ring', color = '#111', bg = 'transparent' }) {
  const dotRef = useRef(null);
  const ringRef = useRef(null);
  const [hovering, setHovering] = useState(false);
  const [inside, setInside] = useState(false);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    let rx = 0, ry = 0, dx = 0, dy = 0, raf;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      dx = e.clientX - r.left;
      dy = e.clientY - r.top;
      if (!raf) {
        raf = requestAnimationFrame(tick);
      }
    };
    const tick = () => {
      rx += (dx - rx) * 0.22;
      ry += (dy - ry) * 0.22;
      if (dotRef.current) dotRef.current.style.transform = `translate(${dx}px,${dy}px) translate(-50%,-50%)`;
      if (ringRef.current) ringRef.current.style.transform = `translate(${rx}px,${ry}px) translate(-50%,-50%)`;
      if (Math.abs(dx - rx) > 0.1 || Math.abs(dy - ry) > 0.1) {
        raf = requestAnimationFrame(tick);
      } else {
        raf = null;
      }
    };
    const onEnter = () => setInside(true);
    const onLeave = () => setInside(false);
    const onOver = (e) => {
      const t = e.target;
      const h = t.closest && t.closest('[data-cursor="hover"], a, button');
      setHovering(!!h);
    };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseenter', onEnter);
    el.addEventListener('mouseleave', onLeave);
    el.addEventListener('mouseover', onOver);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseenter', onEnter);
      el.removeEventListener('mouseleave', onLeave);
      el.removeEventListener('mouseover', onOver);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [containerRef]);

  const ringSize = hovering ? 44 : 28;
  const dotSize = hovering ? 4 : 6;

  return (
    <>
      <div data-clinic-cursor ref={ringRef} style={{
        position: 'absolute', left: 0, top: 0, width: ringSize, height: ringSize,
        border: `1px solid ${color}`, borderRadius: '50%',
        pointerEvents: 'none', zIndex: 1000,
        opacity: inside ? (hovering ? 1 : 0.7) : 0,
        transition: 'width .25s cubic-bezier(.2,.7,.3,1), height .25s cubic-bezier(.2,.7,.3,1), opacity .2s',
        mixBlendMode: variant === 'invert' ? 'difference' : 'normal',
        background: hovering ? bg : 'transparent',
      }} />
      <div data-clinic-cursor ref={dotRef} style={{
        position: 'absolute', left: 0, top: 0, width: dotSize, height: dotSize,
        background: color, borderRadius: '50%',
        pointerEvents: 'none', zIndex: 1001,
        opacity: inside ? 1 : 0,
        transition: 'width .2s, height .2s, opacity .2s',
        mixBlendMode: variant === 'invert' ? 'difference' : 'normal',
      }} />
    </>
  );
}

// ─────────────────────────────────────────────────────────────
// ECG trace — continuous right-to-left canvas draw with realistic
// PQRST morphology and a varying RR interval (60–78 bpm). Exposes
// the current bpm via an optional bpmRef for callers that want a
// live readout.
// ─────────────────────────────────────────────────────────────
function ECG({ height = 60, color = '#111', speed = 'normal', strokeWidth = 1.2, bpmRef, baselineBpm = 68, showGrid = false }) {
  const canvasRef = useRef(null);
  const wrapRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    const wrap = wrapRef.current;
    if (!canvas || !wrap) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    let W = wrap.clientWidth || 1200;
    let H = height;
    const resize = () => {
      W = wrap.clientWidth || 1200;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // Fill background transparent initially
      ctx.clearRect(0, 0, W, H);
    };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(wrap);

    const ctx = canvas.getContext('2d');
    // Pixels per second — slower for 'slow', faster for 'fast'
    const pxPerSec = speed === 'slow' ? 110 : speed === 'fast' ? 260 : 170;
    // RR variation state (seconds between R peaks). Drifts slowly.
    let bpm = baselineBpm;
    let bpmTarget = baselineBpm;
    const baseY = H * 0.55;

    // Pre-compute normalized PQRST waveform as a fn of phase in [0,1)
    // where 1 is one full RR interval. We'll time-compress the waveform
    // to fit ~0.6s around the R peak and flat-line the rest.
    const pqrst = (t) => {
      // t in seconds since the start of the current beat.
      // Components (approx, in seconds):
      //   P: 0.08–0.16 small bump
      //   PR segment: flat until 0.20
      //   QRS: 0.20–0.28, tall spike
      //   ST: 0.28–0.38 flat
      //   T: 0.38–0.55 broad bump
      //   TP: rest — flat
      const scale = H * 0.38; // overall amplitude
      let y = 0;
      // P wave (gaussian)
      const p = Math.exp(-Math.pow((t - 0.12) / 0.025, 2));
      y += -p * 0.15 * scale;
      // Q small dip
      const q = Math.exp(-Math.pow((t - 0.205) / 0.008, 2));
      y += q * 0.12 * scale;
      // R spike (sharp)
      const r = Math.exp(-Math.pow((t - 0.235) / 0.009, 2));
      y += -r * 1.0 * scale;
      // S dip
      const s = Math.exp(-Math.pow((t - 0.265) / 0.012, 2));
      y += s * 0.35 * scale;
      // T wave
      const tw = Math.exp(-Math.pow((t - 0.47) / 0.06, 2));
      y += -tw * 0.30 * scale;
      // tiny baseline noise
      y += (Math.random() - 0.5) * 0.6;
      return baseY + y;
    };

    // Beat scheduler: we keep a list of upcoming R-peak times and
    // draw the waveform piecewise as time advances.
    let lastT = performance.now() / 1000;
    let beatStart = lastT; // start of the current beat
    let rr = 60 / bpm;     // seconds per beat
    let xCursor = W;       // current write x in canvas coords (right-most)

    // Start with one full screen of flat line
    ctx.clearRect(0, 0, W, H);

    let drift = 0;
    const pickTarget = () => {
      // drift smoothly within a tight band around the baseline,
      // clamped to 55..70 bpm (resting-athlete range).
      bpmTarget = baselineBpm + (Math.random() - 0.5) * 10;
      bpmTarget = Math.max(55, Math.min(70, bpmTarget));
    };
    pickTarget();
    const driftTimer = setInterval(pickTarget, 3000);

    let raf;
    const step = () => {
      const now = performance.now() / 1000;
      const dt = Math.min(0.05, now - lastT);
      lastT = now;

      // Smoothly approach target bpm (~2s time constant)
      bpm += (bpmTarget - bpm) * Math.min(1, dt / 2);
      if (bpmRef) bpmRef.current = Math.round(bpm);

      // Pixels we need to advance this frame
      const dx = dt * pxPerSec;

      // Scroll existing content left by dx
      // Use getImageData/putImageData for reliable scrolling
      try {
        const img = ctx.getImageData(dx * dpr, 0, (W - dx) * dpr, H * dpr);
        ctx.putImageData(img, 0, 0);
      } catch (e) {
        // fallback: canvas tainted — re-use drawImage
        ctx.drawImage(canvas, -dx, 0, W, H);
      }
      // Clear the strip on the right we're about to draw into
      ctx.clearRect(W - dx, 0, dx, H);

      // Draw the new segment corresponding to the newest dt seconds
      ctx.strokeStyle = color;
      ctx.lineWidth = strokeWidth;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();

      // We step through sub-pixels to keep the R-spike sharp
      const samples = Math.max(2, Math.ceil(dx * 2));
      for (let i = 0; i <= samples; i++) {
        const sDt = (dt * i) / samples; // seconds into this frame
        const tSec = now - dt + sDt;
        // Determine which beat this sample belongs to
        while (tSec - beatStart >= rr) {
          beatStart += rr;
          rr = 60 / bpm; // update interval per beat
        }
        const tInBeat = tSec - beatStart;
        const x = W - dx + (dx * i) / samples;
        const y = pqrst(tInBeat);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Optional faint grid over the top
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);

    return () => {
      cancelAnimationFrame(raf);
      clearInterval(driftTimer);
      ro.disconnect();
    };
  }, [height, color, speed, strokeWidth, bpmRef, baselineBpm]);

  return (
    <div ref={wrapRef} style={{ height, width: '100%', position: 'relative', overflow: 'hidden' }}>
      {showGrid && <GridBg size={12} color={color} opacity={0.06} />}
      <canvas ref={canvasRef} style={{ display: 'block' }} />
    </div>
  );
}

// Small hook + readout: shows live BPM that actually updates as ECG varies.
function LiveBPM({ bpmRef, color = '#111', style = {} }) {
  const [bpm, setBpm] = useState(bpmRef?.current || 68);
  useEffect(() => {
    const id = setInterval(() => {
      if (bpmRef && bpmRef.current) setBpm(bpmRef.current);
    }, 300);
    return () => clearInterval(id);
  }, [bpmRef]);
  return (
    <span style={{
      fontFamily: '"JetBrains Mono", ui-monospace, monospace',
      fontSize: 10, letterSpacing: 1.4, textTransform: 'uppercase', color,
      display: 'inline-flex', alignItems: 'center', gap: 6, ...style,
    }}>
      <span style={{
        width: 6, height: 6, borderRadius: 3, background: color,
        animation: 'ecg-pulse 1s ease-out infinite',
      }} />
      <style>{`@keyframes ecg-pulse { 0%{opacity:.2} 30%{opacity:1} 100%{opacity:.2} }`}</style>
      BPM {bpm}
    </span>
  );
}

// ─────────────────────────────────────────────────────────────
// Sensor plot — stacked rolling traces (like a multichannel sensor)
// ─────────────────────────────────────────────────────────────
function SensorPlot({ channels = 4, height = 280, color = '#111', showLabels = true, labels }) {
  const ref = useRef(null);
  const [paths, setPaths] = useState([]);
  useEffect(() => {
    let raf, t0 = performance.now();
    const chanH = height / channels;
    const tick = (t) => {
      const elapsed = (t - t0) / 1000;
      const newPaths = [];
      for (let c = 0; c < channels; c++) {
        const baseY = chanH * c + chanH / 2;
        let d = `M 0 ${baseY}`;
        for (let x = 0; x <= 1200; x += 4) {
          const phase = elapsed * (0.6 + c * 0.12) + c * 1.3;
          const wave =
            Math.sin(x * 0.012 + phase) * (chanH * 0.2) +
            Math.sin(x * 0.04 + phase * 1.7) * (chanH * 0.08) +
            Math.sin(x * 0.09 + phase * 2.1 + c) * (chanH * 0.04);
          d += ` L ${x} ${baseY + wave}`;
        }
        newPaths.push(d);
      }
      setPaths(newPaths);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [channels, height]);

  const defaultLabels = ['CH.01', 'CH.02', 'CH.03', 'CH.04', 'CH.05', 'CH.06'];
  const lbl = labels || defaultLabels;
  const chanH = height / channels;

  return (
    <div ref={ref} style={{ width: '100%', height, position: 'relative' }}>
      <svg width="100%" height={height} viewBox={`0 0 1200 ${height}`} preserveAspectRatio="none">
        {Array.from({ length: channels }).map((_, i) => (
          <line key={i} x1="0" x2="1200" y1={chanH * i + chanH / 2} y2={chanH * i + chanH / 2}
            stroke={color} strokeOpacity="0.1" strokeDasharray="2 4" />
        ))}
        {paths.map((d, i) => (
          <path key={i} d={d} fill="none" stroke={color} strokeWidth="1" strokeLinejoin="round" />
        ))}
      </svg>
      {showLabels && (
        <div style={{ position: 'absolute', left: 0, top: 0, height, display: 'flex', flexDirection: 'column' }}>
          {Array.from({ length: channels }).map((_, i) => (
            <div key={i} style={{
              height: chanH, display: 'flex', alignItems: 'center',
              fontFamily: 'ui-monospace, monospace', fontSize: 9, color, opacity: 0.5,
              paddingLeft: 8,
            }}>{lbl[i]}</div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grid / dot textures
// ─────────────────────────────────────────────────────────────
function GridBg({ size = 24, color = '#111', opacity = 0.06, style = {} }) {
  const url = `url("data:image/svg+xml,%3Csvg width='${size}' height='${size}' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M ${size} 0 L 0 0 0 ${size}' fill='none' stroke='${encodeURIComponent(color)}' stroke-opacity='${opacity}' stroke-width='1'/%3E%3C/svg%3E")`;
  return <div style={{ position: 'absolute', inset: 0, backgroundImage: url, backgroundSize: `${size}px ${size}px`, pointerEvents: 'none', ...style }} />;
}

function DotBg({ size = 18, color = '#111', opacity = 0.15, style = {} }) {
  const url = `url("data:image/svg+xml,%3Csvg width='${size}' height='${size}' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='${encodeURIComponent(color)}' fill-opacity='${opacity}'/%3E%3C/svg%3E")`;
  return <div style={{ position: 'absolute', inset: 0, backgroundImage: url, backgroundSize: `${size}px ${size}px`, pointerEvents: 'none', ...style }} />;
}

// ─────────────────────────────────────────────────────────────
// Portrait placeholder — striped SVG with mono caption
// ─────────────────────────────────────────────────────────────
function Portrait({ w = 180, h = 240, note = 'portrait', color = '#111', bg = '#f4f1ea' }) {
  return (
    <div style={{ width: w, height: h, position: 'relative', overflow: 'hidden', background: bg, flexShrink: 0 }}>
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ position: 'absolute', inset: 0 }}>
        <defs>
          <pattern id={`stripes-${w}-${h}`} patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="6" stroke={color} strokeWidth="1" strokeOpacity="0.12" />
          </pattern>
        </defs>
        <rect width={w} height={h} fill={`url(#stripes-${w}-${h})`} />
        <rect x="0.5" y="0.5" width={w-1} height={h-1} fill="none" stroke={color} strokeWidth="1" strokeOpacity="0.5" />
      </svg>
      <div style={{
        position: 'absolute', left: 8, bottom: 6,
        fontFamily: 'ui-monospace, monospace', fontSize: 9, letterSpacing: 0.4,
        color, opacity: 0.55, textTransform: 'uppercase',
      }}>{note}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Image placeholder (rectangular, any size)
// ─────────────────────────────────────────────────────────────
function ImgPlaceholder({ w = '100%', h = 200, note = 'image', color = '#111', bg = '#f4f1ea', stripe = 'diag' }) {
  const patId = `p-${Math.random().toString(36).slice(2, 8)}`;
  const pat = stripe === 'diag' ? (
    <pattern id={patId} patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke={color} strokeWidth="1" strokeOpacity="0.1" />
    </pattern>
  ) : (
    <pattern id={patId} patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="1" cy="1" r="0.8" fill={color} fillOpacity="0.15" />
    </pattern>
  );
  return (
    <div style={{ width: w, height: h, position: 'relative', overflow: 'hidden', background: bg }}>
      <svg width="100%" height="100%" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0 }}>
        <defs>{pat}</defs>
        <rect width="100%" height="100%" fill={`url(#${patId})`} />
      </svg>
      <div style={{
        position: 'absolute', left: 10, bottom: 8,
        fontFamily: 'ui-monospace, monospace', fontSize: 10, letterSpacing: 0.5,
        color, opacity: 0.5, textTransform: 'uppercase',
      }}>{note}</div>
    </div>
  );
}

Object.assign(window, {
  RouteProvider, RouteCtx, useRoute,
  Reveal, CustomCursor, ECG, LiveBPM, SensorPlot,
  GridBg, DotBg, Portrait, ImgPlaceholder,
});


// ===== clinic.jsx =====
// Direction 3: CLINIC
// Swiss grid — numbered sections, tight mono everywhere, strict 12-col grid,
// subtle sensor plot as home centerpiece.

const CL_COLORS = {
  paper: '#eeeae0',
  ink: '#0f0f0f',
  rule: 'rgba(15,15,15,0.22)',
  mute: 'rgba(15,15,15,0.58)',
};

const CL_FONTS = {
  mono: '"JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, monospace',
};

function CLLabel({ n, children }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'baseline', gap: 10,
      fontFamily: CL_FONTS.mono, fontSize: 10, letterSpacing: 1.6,
      textTransform: 'uppercase', color: CL_COLORS.mute,
    }}>
      <span style={{ fontVariantNumeric: 'tabular-nums' }}>{n}</span>
      <span style={{ width: 20, height: 1, background: CL_COLORS.rule }} />
      <span>{children}</span>
    </div>
  );
}

function CLGrid({ children, style = {} }) {
  return (
    <div className="cl-grid" style={{
      display: 'grid', gridTemplateColumns: 'repeat(12, 1fr)',
      columnGap: 24, rowGap: 0, ...style,
    }}>{children}</div>
  );
}

function CLShell({ children }) {
  const { route, go } = useRoute();
  const { isMobile, isTablet } = useContext(MobileCtx);
  const bpmRef = useRef(62);
  const pages = [
    { id: 'home', n: '§0', l: 'Index' },
    { id: 'about', n: '§1', l: 'About' },
    { id: 'cv', n: '§2', l: 'CV' },
    { id: 'projects', n: '§3', l: 'Projects' },
  ];
  return (
    <div style={{
      background: CL_COLORS.paper, color: CL_COLORS.ink, height: '100%',
      fontFamily: CL_FONTS.mono, fontSize: 13,
      display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden',
    }}>
      <header style={{
        padding: isMobile ? '12px 20px' : isTablet ? '16px 32px' : '22px 40px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        borderBottom: `1px solid ${CL_COLORS.rule}`, flexShrink: 0,
      }}>
        <div onClick={() => go('home')} data-cursor="hover" style={{
          cursor: 'pointer', fontSize: 13, letterSpacing: 0.3, lineHeight: 1.3,
          display: 'flex', alignItems: 'center', gap: 12,
        }}>
          {route !== 'about' && (
            <div style={{
